<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCONF 2026</title>
    <link rel="stylesheet" href="./style.css">

    <!-- arimo font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Arimo:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <!-- Inter font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <nav>

            <div class="left_nav_bar">
                <img src="./assets/logo.png" alt="logo">
            </div>

            <ul class="middle_nav_bar">
                <li>Speakers</li>
                <li>Schedule</li>
                <li>Tracks</li>
                <li>Venue</li>
                <li>Blog</li>
            </ul>

            <button class="right_nav_bar common_button">Register Now</button>

        </nav>
    </header>

    <!-- Hero Section-->
    <section>
        <img src="./assets/banner.jpg" alt="banner">
        <div class="overlay"></div>
        <div class="section">
            <div class="section_top">
                <h2>Code. <span>Connect.</span> Create.</h2>
                <div>
                    <p>Join 4,000+ engineers, founders, and builders at the premier developer </p>
                    <p>conference of 2026. Three days of cutting-edge talks, hands-on workshops, </p>
                    <p>and meaningful connections.</p>              
                    
                </div>
            </div>
            <div class="section_bottom">
                <button class="common_button">Register Now</button>
            </div>
        </div>
    </section>

</body>
</html>
